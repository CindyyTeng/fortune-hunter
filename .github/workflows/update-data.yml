name: Update market recommendations

on:
  workflow_dispatch:
  schedule:
    # Taiwan market hours: every 10 minutes on weekdays, UTC time.
    # 09:00-12:50 Asia/Taipei -> 01:00-04:50 UTC
    - cron: "0,10,20,30,40,50 1-4 * * 1-5"
    # 13:00-13:30 Asia/Taipei -> 05:00-05:30 UTC
    - cron: "0,10,20,30 5 * * 1-5"
    # One extra refresh after market close and data settlement.
    - cron: "10 7 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate recommendations
        run: npm run generate
        env:
          SYMBOLS_PER_MARKET: 120
          CONCURRENCY: 6
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update market recommendations"
          file_pattern: data/recommendations.json
