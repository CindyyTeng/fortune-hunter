<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>獵金羅盤 Fortune Hunter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#162019;
  --muted:#6c7666;
  --panel:#fffdf5;
  --panel-soft:#f6f0df;
  --line:rgba(33,48,33,.14);
  --green:#1f6a45;
  --green-dark:#143d2b;
  --mint:#dcebd8;
  --gold:#c8952f;
  --gold-soft:#fff1c7;
  --red:#b34034;
  --teal:#247c75;
  --shadow:0 16px 42px rgba(24,39,26,.14);
}
* { box-sizing:border-box; }
body {
  margin:0;
  min-height:100vh;
  color:var(--ink);
  font-family:'Noto Sans TC', sans-serif;
  background:
    linear-gradient(120deg, rgba(255,255,255,.72) 0 1px, transparent 1px 42px),
    linear-gradient(90deg, rgba(31,106,69,.08), transparent 34%),
    linear-gradient(180deg, #fbf8ed 0%, #edf4e7 48%, #d7e9d3 100%);
}
body::before {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(135deg, transparent 0 58%, rgba(200,149,47,.12) 58% 59%, transparent 59%),
    radial-gradient(ellipse at 72% 8%, rgba(36,124,117,.16), transparent 42%);
  z-index:-1;
}
button { font:inherit; }
#app { width:min(1180px, 100%); margin:0 auto; padding:22px 14px 58px; }
.shell {
  border:1px solid var(--line);
  background:rgba(255,253,245,.82);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:14px 18px;
  border-radius:8px 8px 0 0;
  background:#17241b;
  color:#fbf8ed;
}
.brand { display:flex; align-items:center; gap:12px; min-width:0; }
.brand-mark {
  width:38px;
  height:38px;
  display:grid;
  place-items:center;
  border:1px solid rgba(255,255,255,.22);
  background:linear-gradient(135deg, var(--gold), #ffe6a3);
  color:#17241b;
  font-weight:900;
  border-radius:50%;
}
.brand small { display:block; color:#cbd8bf; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
.brand strong { display:block; font-family:'Noto Serif TC', serif; font-size:24px; letter-spacing:.04em; white-space:nowrap; }
.refresh {
  min-height:40px;
  padding:8px 14px;
  border:1px solid rgba(255,255,255,.24);
  background:#fbf8ed;
  color:#17241b;
  border-radius:8px;
  cursor:pointer;
  font-weight:900;
  white-space:nowrap;
}
.refresh:disabled { opacity:.62; cursor:wait; }
.action-group { display:flex; gap:8px; width:100%; max-width:290px; }
.live {
  min-height:40px;
  padding:8px 12px;
  border:1px solid rgba(255,255,255,.24);
  background:rgba(251,248,237,.12);
  color:#fbf8ed;
  border-radius:8px;
  cursor:pointer;
  font-weight:800;
  white-space:nowrap;
}
.hero {
  display:grid;
  grid-template-columns:minmax(0, 1fr) 310px;
  gap:18px;
  padding:24px 22px 18px;
}
.hero h1 {
  margin:0;
  max-width:820px;
  font-family:'Noto Serif TC', serif;
  font-size:52px;
  line-height:1.05;
  letter-spacing:0;
  color:#173c28;
}
.lead { margin:12px 0 0; max-width:760px; color:var(--muted); line-height:1.75; }
.market-card {
  align-self:stretch;
  border:1px solid var(--line);
  border-radius:8px;
  background:linear-gradient(180deg, #1f6a45, #173c28);
  color:#fbf8ed;
  padding:16px;
  position:relative;
  overflow:hidden;
}
.market-card::after {
  content:"";
  position:absolute;
  inset:auto -20px -26px 28%;
  height:90px;
  background:linear-gradient(135deg, transparent 0 42%, rgba(255,230,163,.34) 42% 44%, transparent 44% 55%, rgba(255,230,163,.22) 55% 57%, transparent 57%);
}
.market-card span { color:#d8e8d4; font-size:12px; font-weight:700; }
.market-card b { display:block; margin-top:6px; font-size:32px; line-height:1; }
.market-card p { margin:10px 0 0; color:#eaf2dc; line-height:1.6; position:relative; z-index:1; }
.stats {
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:1px;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  background:var(--line);
}
.stat {
  padding:14px 18px;
  background:rgba(255,253,245,.86);
}
.stat strong { display:block; font-size:22px; color:#183f2a; line-height:1.2; word-break:break-word; }
.stat span { display:block; margin-top:4px; color:var(--muted); font-size:12px; }
.notice {
  margin:16px 0;
  padding:13px 14px;
  border:1px solid rgba(36,124,117,.18);
  border-left:4px solid var(--teal);
  border-radius:8px;
  background:rgba(255,253,245,.72);
  color:#354438;
  line-height:1.65;
}
.cards { display:grid; gap:12px; }
.card {
  display:grid;
  grid-template-columns:minmax(0, 1fr) 300px;
  gap:16px;
  padding:16px;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(255,253,245,.9);
  box-shadow:0 10px 26px rgba(24,39,26,.08);
}
.card-head {
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
}
.stock-name { margin:0; font-size:25px; line-height:1.25; }
.stock-code { display:inline-block; margin-left:8px; color:var(--muted); font-size:13px; font-weight:700; }
.signal {
  display:inline-flex;
  margin-top:8px;
  padding:4px 9px;
  border:1px solid rgba(31,106,69,.24);
  border-radius:999px;
  background:var(--mint);
  color:#173c28;
  font-size:12px;
  font-weight:900;
}
.score {
  min-width:102px;
  text-align:right;
}
.score strong { display:block; color:#173c28; font-size:42px; line-height:.95; }
.score span { color:var(--muted); font-size:12px; font-weight:700; }
.score-bar {
  height:6px;
  margin-top:8px;
  border-radius:99px;
  background:#e4dfcf;
  overflow:hidden;
}
.score-bar i { display:block; height:100%; width:var(--score); background:linear-gradient(90deg, var(--gold), var(--green)); }
.metrics {
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:8px;
  margin:14px 0;
}
.metric {
  min-height:76px;
  padding:10px;
  border:1px solid var(--line);
  border-radius:8px;
  background:#fffaf0;
}
.metric b { display:block; font-size:16px; overflow-wrap:anywhere; }
.metric span { display:block; margin-top:4px; color:var(--muted); font-size:11px; line-height:1.35; }
.section-title { margin:15px 0 7px; color:#173c28; font-size:13px; font-weight:900; letter-spacing:.04em; text-transform:uppercase; }
.reason-list {
  margin:0;
  padding-left:18px;
  line-height:1.72;
}
.reason-list li { margin:2px 0; }
.plan { display:grid; gap:8px; }
.plan-row {
  padding:10px 11px;
  border:1px solid rgba(200,149,47,.22);
  border-radius:8px;
  background:linear-gradient(180deg, #fffdf7, #fff7df);
  line-height:1.64;
}
.side {
  border-left:1px solid var(--line);
  padding-left:16px;
}
.backtests { display:grid; gap:8px; }
.backtest {
  padding:10px;
  border:1px solid rgba(36,124,117,.18);
  border-radius:8px;
  background:rgba(36,124,117,.07);
  line-height:1.55;
}
.backtest b { display:block; color:#1f4e4a; margin-bottom:3px; }
.positive { color:#1f6a45; font-weight:900; }
.negative { color:var(--red); font-weight:900; }
.empty {
  padding:36px 16px;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(255,253,245,.86);
  text-align:center;
  color:var(--muted);
}
footer {
  margin-top:18px;
  color:#616b5c;
  font-size:12px;
  line-height:1.8;
}
@media (max-width: 860px) {
  #app { padding:10px 8px 42px; }
  .topbar { align-items:flex-start; flex-direction:column; }
  .action-group { max-width:none; }
  .refresh, .live { width:100%; }
  .hero { grid-template-columns:1fr; padding:18px 14px; }
  .hero h1 { font-size:38px; }
  .stats { grid-template-columns:repeat(2, 1fr); }
  .card { grid-template-columns:1fr; padding:13px; }
  .card-head { display:block; }
  .score { margin-top:12px; text-align:left; }
  .metrics { grid-template-columns:repeat(2, minmax(0, 1fr)); }
  .side { border-left:0; padding-left:0; border-top:1px solid var(--line); padding-top:12px; }
}
@media (max-width: 440px) {
  .brand strong { font-size:21px; }
  .hero h1 { font-size:32px; }
  .stats { grid-template-columns:1fr; }
  .metrics { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<main id="app">
  <section class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">FH</div>
        <div>
          <small>Fortune Hunter</small>
          <strong>獵金羅盤</strong>
        </div>
      </div>
      <div class="action-group">
        <button id="refresh" class="refresh" type="button">重新讀取</button>
        <button id="live" class="live" type="button">即時連線</button>
      </div>
    </header>

    <section class="hero">
      <div>
        <h1>台股資金狩獵儀表板</h1>
        <p class="lead">追蹤上市與上櫃股票的量價趨勢、技術條件與近三個月覆盤，把買入候選、進出場區間與風險位置整理成一張可行動清單。</p>
      </div>
      <aside class="market-card">
        <span>本輪候選</span>
        <b id="heroCount">-</b>
        <p id="heroCopy">等待最新資料載入。</p>
      </aside>
    </section>

    <section class="stats" aria-live="polite">
      <div class="stat"><strong id="asOf">讀取中</strong><span>資料時間</span></div>
      <div class="stat"><strong id="universe">-</strong><span>上市上櫃股票池</span></div>
      <div class="stat"><strong id="scanned">-</strong><span>本次實際掃描</span></div>
      <div class="stat"><strong id="count">-</strong><span>買入/觀察候選</span></div>
    </section>
  </section>

  <section id="message" class="notice">正在讀取最新分析資料。</section>
  <section id="cards" class="cards"></section>

  <footer>
    資料來源：TWSE OpenAPI、TPEx 公開日收盤資料、Yahoo Finance chart API。GitHub Pages 顯示 GitHub Actions 產生的最新分析結果；所有內容僅供研究與篩選，不構成投資建議。
  </footer>
</main>

<script>
const els = {
  refresh: document.getElementById('refresh'),
  live: document.getElementById('live'),
  asOf: document.getElementById('asOf'),
  universe: document.getElementById('universe'),
  scanned: document.getElementById('scanned'),
  count: document.getElementById('count'),
  heroCount: document.getElementById('heroCount'),
  heroCopy: document.getElementById('heroCopy'),
  message: document.getElementById('message'),
  cards: document.getElementById('cards')
};
let currentData = null;
let liveSource = null;
let liveUrl = localStorage.getItem('fh_live_url') || '';

const escapeMap = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };
function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => escapeMap[char]);
}
function pctClass(value) {
  return Number(value) >= 0 ? 'positive' : 'negative';
}
function fmt(value, suffix = '') {
  return value === null || value === undefined ? '-' : `${esc(value)}${suffix}`;
}
function money(value) {
  return value === null || value === undefined ? '-' : `NT$ ${Number(value).toLocaleString('zh-TW')}`;
}
function localTime(iso) {
  if (!iso) return '尚未產生';
  return new Intl.DateTimeFormat('zh-TW', { dateStyle:'medium', timeStyle:'short' }).format(new Date(iso));
}

function renderBacktests(backtests) {
  if (!backtests?.length) return '<div class="backtest">近三個月沒有足夠相同訊號可覆盤。</div>';
  return backtests.map(hit => `
    <div class="backtest">
      <b>${esc(hit.date)} 觸發，分數 ${fmt(hit.signalScore)}</b>
      <div>進場 ${money(hit.entryPrice)}</div>
      <div>5日 <span class="${pctClass(hit.return5d)}">${fmt(hit.return5d, '%')}</span>，20日 <span class="${pctClass(hit.return20d)}">${fmt(hit.return20d, '%')}</span></div>
      <div>20日最大漲幅 <span class="${pctClass(hit.maxGain20d)}">${fmt(hit.maxGain20d, '%')}</span>，最大回撤 <span class="${pctClass(hit.maxDrawdown20d)}">${fmt(hit.maxDrawdown20d, '%')}</span></div>
    </div>`).join('');
}

function renderCard(item) {
  const score = Math.max(0, Math.min(100, Number(item.score || 0)));
  return `
    <article class="card">
      <div>
        <div class="card-head">
          <div>
            <h2 class="stock-name">${esc(item.name)}<span class="stock-code">${esc(item.code)} ${esc(item.market)}</span></h2>
            <span class="signal">${esc(item.signal)}</span>
          </div>
          <div class="score">
            <strong>${score}</strong>
            <span>推薦分數 / 100</span>
            <div class="score-bar" style="--score:${score}%"><i></i></div>
          </div>
        </div>

        <div class="metrics">
          <div class="metric"><b>${money(item.latestPrice)}</b><span>最新收盤 ${esc(item.latestDate || '')}</span></div>
          <div class="metric"><b class="${pctClass(item.liveChangePercent)}">${fmt(item.liveChangePercent, '%')}</b><span>即時變動(若有)</span></div>
          <div class="metric"><b>${fmt(item.metrics?.rsi14)}</b><span>RSI(14)</span></div>
          <div class="metric"><b>${money(item.metrics?.ma20)}</b><span>20日線</span></div>
          <div class="metric"><b class="${pctClass(item.change60d)}">${fmt(item.change60d, '%')}</b><span>近三個月</span></div>
          <div class="metric"><b>${fmt(item.metrics?.intentFactor60)}</b><span>價格意圖因子(60日)</span></div>
          <div class="metric"><b>${fmt(item.metrics?.rsv60)}</b><span>60日相對位置</span></div>
          <div class="metric"><b>${fmt(item.metrics?.std20)}</b><span>20日波動</span></div>
          <div class="metric"><b>${fmt(item.metrics?.std60)}</b><span>60日波動</span></div>
        </div>

        <div class="section-title">推論依據</div>
        <ul class="reason-list">${(item.reasons || []).map(reason => `<li>${esc(reason)}</li>`).join('')}</ul>
        ${(item.risks || []).length ? `<div class="section-title">風險提醒</div><ul class="reason-list">${item.risks.map(risk => `<li>${esc(risk)}</li>`).join('')}</ul>` : ''}

        <div class="section-title">操作手法</div>
        <div class="plan">
          <div class="plan-row"><b>買進：</b>${esc(item.plan?.entry || '-')}</div>
          <div class="plan-row"><b>賣出：</b>${esc(item.plan?.takeProfit || '-')}</div>
          <div class="plan-row"><b>止損：</b>${esc(item.plan?.stopLoss || '-')}</div>
          <div class="plan-row"><b>部位：</b>${esc(item.plan?.positionSizing || '-')}</div>
        </div>
      </div>

      <aside class="side">
        <div class="section-title">三個月覆盤</div>
        <div class="backtests">${renderBacktests(item.backtest)}</div>
      </aside>
    </article>`;
}

async function loadData() {
  els.refresh.disabled = true;
  els.message.textContent = '正在讀取最新分析資料。';
  try {
    const response = await fetch(`data/recommendations.json?ts=${Date.now()}`, { cache:'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    currentData = data;
    const count = data.recommendations?.length || 0;
    els.asOf.textContent = data.generatedAtTaipei || localTime(data.asOf);
    els.universe.textContent = Number(data.universeSize || 0).toLocaleString('zh-TW');
    els.scanned.textContent = Number(data.scanned || 0).toLocaleString('zh-TW');
    els.count.textContent = count;
    els.heroCount.textContent = count;
    els.heroCopy.textContent = data.scanStrategy || '上市上櫃候選池已完成掃描。';
    els.message.textContent = data.source || '資料已載入。';

    if (!count) {
      els.cards.innerHTML = '<div class="empty">目前沒有符合條件的買入候選。請到 GitHub Actions 手動執行一次 Update market recommendations。</div>';
      return;
    }
    els.cards.innerHTML = data.recommendations.map(renderCard).join('');
    if (liveUrl) connectLive(liveUrl);
  } catch (error) {
    els.message.textContent = `資料讀取失敗：${error.message}`;
    els.heroCopy.textContent = '資料尚未準備完成。';
    els.cards.innerHTML = '<div class="empty">找不到推薦資料。請確認 data/recommendations.json 已由 Node 腳本產生並部署。</div>';
  } finally {
    els.refresh.disabled = false;
  }
}

function applyLiveQuotes(payload) {
  if (!currentData?.recommendations?.length || !payload?.quotes?.length) return;
  const quoteMap = new Map(payload.quotes.map(quote => [quote.symbol, quote]));
  for (const row of currentData.recommendations) {
    const symbol = `${row.code}.${row.market === '上市' ? 'TW' : 'TWO'}`;
    const live = quoteMap.get(symbol);
    if (!live) continue;
    row.latestPrice = live.price;
    row.latestDate = new Date(live.ts).toISOString().slice(0, 10);
    row.liveChangePercent = live.changePercent;
  }
  els.asOf.textContent = `即時 ${new Intl.DateTimeFormat('zh-TW', { timeStyle:'medium' }).format(new Date())}`;
  els.cards.innerHTML = currentData.recommendations.map(renderCard).join('');
}

function connectLive(url) {
  if (liveSource) {
    liveSource.close();
    liveSource = null;
  }
  try {
    const streamUrl = url.endsWith('/stream') ? url : `${url.replace(/\/$/, '')}/stream`;
    liveSource = new EventSource(streamUrl);
    liveSource.addEventListener('quotes', event => {
      const payload = JSON.parse(event.data);
      applyLiveQuotes(payload);
      els.message.textContent = `即時串流中：${url}`;
    });
    liveSource.addEventListener('error', () => {
      els.message.textContent = `即時串流中斷，使用靜態資料：${url}`;
    });
  } catch (error) {
    els.message.textContent = `即時串流啟動失敗：${error.message}`;
  }
}

function setupLiveButton() {
  els.live.textContent = liveUrl ? '即時連線中' : '即時連線';
  els.live.addEventListener('click', () => {
    const input = prompt('請輸入後端網址，例如 https://your-live.onrender.com', liveUrl || '');
    if (input === null) return;
    liveUrl = input.trim();
    if (!liveUrl) {
      localStorage.removeItem('fh_live_url');
      if (liveSource) liveSource.close();
      liveSource = null;
      els.live.textContent = '即時連線';
      els.message.textContent = '已關閉即時模式，使用 GitHub Actions 產生的靜態資料。';
      return;
    }
    localStorage.setItem('fh_live_url', liveUrl);
    els.live.textContent = '即時連線中';
    connectLive(liveUrl);
  });
}

els.refresh.addEventListener('click', loadData);
setupLiveButton();
loadData();
</script>
</body>
</html>
