<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fortune Hunter 選股雷達</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Newsreader:opsz,wght@6..72,600;6..72,700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#21191a;
  --muted:#6c5d61;
  --line:rgba(84,44,53,.16);
  --paper:#fffaf5;
  --paper-soft:#fff3ea;
  --paper-deep:#f7e2d7;
  --brand:#a12d3f;
  --brand-strong:#7f1d33;
  --brand-soft:#f4d3db;
  --warn:#d28a2f;
  --navy:#24324a;
  --down:#1d8b66;
  --up:#c43a3a;
  --shadow:0 18px 44px rgba(75,31,42,.12);
}
* { box-sizing:border-box; }
body {
  margin:0;
  min-height:100vh;
  color:var(--ink);
  font-family:'Noto Sans TC', sans-serif;
  background:
    radial-gradient(circle at top right, rgba(161,45,63,.12), transparent 28%),
    radial-gradient(circle at left 20%, rgba(210,138,47,.10), transparent 30%),
    linear-gradient(180deg, #fffdfb 0%, #fff7f1 48%, #f8ebe4 100%);
}
body::before {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(120deg, rgba(255,255,255,.42) 0 1px, transparent 1px 34px),
    linear-gradient(90deg, rgba(161,45,63,.05), transparent 38%);
  z-index:-1;
}
button { font:inherit; }
#app { width:min(1240px, 100%); margin:0 auto; padding:22px 14px 60px; }
.shell {
  border:1px solid var(--line);
  border-radius:22px;
  background:rgba(255,250,245,.86);
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
  overflow:hidden;
}
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  padding:18px 22px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.08), transparent 42%),
    linear-gradient(120deg, var(--navy), #301a22 60%, var(--brand-strong));
  color:#fff7f1;
}
.brand {
  display:flex;
  align-items:center;
  gap:14px;
}
.brand-mark {
  width:44px;
  height:44px;
  display:grid;
  place-items:center;
  border-radius:14px;
  background:linear-gradient(135deg, #ffcc89, #fff2d8);
  color:#4a1d23;
  font-weight:900;
}
.brand small {
  display:block;
  color:#f7d8dc;
  font-size:12px;
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
}
.brand strong {
  display:block;
  font-family:'Newsreader', serif;
  font-size:28px;
  letter-spacing:.01em;
}
.action-group {
  display:flex;
  gap:10px;
  width:100%;
  max-width:320px;
}
.refresh,
.live {
  flex:1;
  min-height:42px;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.18);
  cursor:pointer;
  font-weight:800;
}
.refresh { background:#fff8f2; color:#351c21; }
.live { background:rgba(255,255,255,.08); color:#fff7f1; }
.hero {
  display:grid;
  grid-template-columns:minmax(0, 1.3fr) minmax(300px, .7fr);
  gap:18px;
  padding:24px 22px 18px;
}
.hero-copy {
  padding:24px;
  border-radius:22px;
  background:
    linear-gradient(140deg, rgba(161,45,63,.10), rgba(255,255,255,.75)),
    linear-gradient(180deg, #fffdfb, #fff3ea);
  border:1px solid rgba(161,45,63,.12);
}
.hero-copy h1 {
  margin:0;
  font-family:'Newsreader', serif;
  font-size:56px;
  line-height:1;
  letter-spacing:-.02em;
  color:#341a1e;
}
.lead {
  margin:14px 0 0;
  color:var(--muted);
  line-height:1.85;
}
.hero-chip-row {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:18px;
}
.hero-chip {
  padding:8px 12px;
  border-radius:999px;
  background:#fff7ef;
  border:1px solid rgba(161,45,63,.14);
  color:#5a2e34;
  font-size:12px;
  font-weight:800;
}
.market-card {
  display:grid;
  gap:14px;
  padding:20px;
  border-radius:22px;
  background:
    linear-gradient(180deg, rgba(36,50,74,.98), rgba(55,25,34,.96)),
    linear-gradient(180deg, #24324a, #3c1d28);
  color:#fff7f1;
  position:relative;
  overflow:hidden;
}
.market-card::after {
  content:"";
  position:absolute;
  right:-24px;
  bottom:-24px;
  width:140px;
  height:140px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,205,136,.35), transparent 70%);
}
.market-card span {
  color:#ffd2d8;
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.market-card b {
  display:block;
  font-size:34px;
  line-height:1;
}
.market-card p { margin:0; color:#fde9ea; line-height:1.7; }
.stats {
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:12px;
  padding:0 22px 22px;
}
.stat {
  padding:16px;
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(255,250,245,.9);
  box-shadow:0 8px 20px rgba(73,35,43,.05);
}
.stat strong { display:block; font-size:22px; color:#311c21; line-height:1.2; }
.stat span { display:block; margin-top:6px; color:var(--muted); font-size:12px; }
.notice {
  margin:18px 0;
  padding:15px 16px;
  border:1px solid rgba(161,45,63,.18);
  border-left:6px solid var(--brand);
  border-radius:16px;
  background:rgba(255,250,245,.9);
  color:#51363b;
  line-height:1.7;
}
.cards { display:grid; gap:16px; }
.card {
  border:1px solid var(--line);
  border-radius:22px;
  background:linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,246,240,.94));
  box-shadow:0 14px 32px rgba(73,35,43,.08);
  overflow:hidden;
}
.card-summary {
  display:grid;
  grid-template-columns:minmax(0, 1fr) auto;
  gap:12px;
  align-items:center;
  padding:14px 16px;
  background:linear-gradient(180deg, #fffdfb, #fff6ef);
}
.card-summary-main {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  min-width:0;
}
.summary-name {
  font-size:20px;
  font-weight:900;
  color:#2f2024;
}
.summary-code {
  font-size:12px;
  color:var(--muted);
  font-weight:700;
}
.summary-score {
  padding:5px 10px;
  border-radius:999px;
  background:#f4ebe6;
  border:1px solid rgba(84,44,53,.18);
  font-size:12px;
  font-weight:900;
  color:#4a2d33;
}
.signal,
.sell-badge {
  display:inline-flex;
  align-items:center;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}
.signal {
  border:1px solid rgba(161,45,63,.18);
  background:var(--brand-soft);
  color:#6b1e30;
}
.sell-badge {
  border:1px solid rgba(36,50,74,.16);
  background:#f8ebe4;
  color:#49343a;
}
.card-toggle {
  border:1px solid rgba(36,50,74,.18);
  background:#fff8f2;
  color:#3d2a2f;
  border-radius:10px;
  padding:8px 12px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}
.card-detail {
  display:grid;
  grid-template-columns:minmax(0, 1fr) 320px;
  gap:16px;
  padding:0 16px 16px;
}
.card.collapsed .card-detail { display:none; }
.card-head {
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  padding-top:4px;
}
.stock-name {
  margin:0;
  font-size:28px;
  line-height:1.15;
}
.stock-code {
  display:inline-block;
  margin-left:10px;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}
.signal-row {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}
.score {
  min-width:132px;
  text-align:right;
}
.score strong {
  display:block;
  font-size:46px;
  line-height:.95;
  color:#341a1e;
}
.score span {
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}
.score-bar {
  height:8px;
  margin-top:10px;
  border-radius:999px;
  background:#eaded8;
  overflow:hidden;
}
.score-bar i {
  display:block;
  height:100%;
  width:var(--score);
  background:linear-gradient(90deg, #d99843, var(--brand));
}
.metrics {
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:10px;
  margin:16px 0;
}
.metric {
  min-height:84px;
  padding:12px;
  border:1px solid rgba(161,45,63,.12);
  border-radius:16px;
  background:#fff8f2;
}
.metric b {
  display:block;
  font-size:16px;
  color:#301c21;
  overflow-wrap:anywhere;
}
.metric span {
  display:block;
  margin-top:6px;
  color:var(--muted);
  font-size:11px;
  line-height:1.4;
}
.section-title {
  margin:16px 0 8px;
  color:#4f2730;
  font-size:13px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.reason-list {
  margin:0;
  padding-left:18px;
  line-height:1.76;
}
.reason-list li { margin:3px 0; }
.plan {
  display:grid;
  gap:10px;
}
.plan-row {
  padding:12px;
  border-radius:16px;
  border:1px solid rgba(210,138,47,.22);
  background:linear-gradient(180deg, #fffdf8, #fff4e7);
  line-height:1.7;
}
.side {
  border-left:1px solid var(--line);
  padding-left:16px;
}
.side-panel {
  padding:14px;
  border-radius:18px;
  border:1px solid rgba(36,50,74,.10);
  background:#fff7f1;
}
.warning-box {
  padding:12px;
  border-radius:16px;
  border:1px solid rgba(161,45,63,.18);
  background:linear-gradient(180deg, #fff3f3, #fff7f2);
  line-height:1.7;
}
.warning-box strong { color:#7f1d33; }
.backtests { display:grid; gap:10px; }
.backtest {
  padding:12px;
  border:1px solid rgba(36,50,74,.12);
  border-radius:16px;
  background:#fdf8f4;
  line-height:1.6;
}
.backtest b { display:block; color:#2f2f3a; margin-bottom:4px; }
.positive { color:var(--up); font-weight:900; }
.negative { color:var(--down); font-weight:900; }
.empty {
  padding:40px 16px;
  border:1px solid var(--line);
  border-radius:18px;
  background:rgba(255,250,245,.9);
  text-align:center;
  color:var(--muted);
}
footer {
  margin-top:18px;
  color:#665a5c;
  font-size:12px;
  line-height:1.8;
}
@media (max-width: 980px) {
  .hero { grid-template-columns:1fr; }
  .stats { grid-template-columns:repeat(2, 1fr); }
  .card-detail { grid-template-columns:1fr; }
  .side {
    border-left:0;
    padding-left:0;
    border-top:1px solid var(--line);
    padding-top:14px;
  }
}
@media (max-width: 860px) {
  #app { padding:10px 8px 42px; }
  .topbar { flex-direction:column; align-items:flex-start; }
  .action-group { max-width:none; }
  .hero-copy h1 { font-size:40px; }
  .metrics { grid-template-columns:repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 440px) {
  .brand strong { font-size:23px; }
  .hero-copy h1 { font-size:34px; }
  .stats, .metrics { grid-template-columns:1fr; }
  .card-summary { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<main id="app">
  <section class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">FH</div>
        <div>
          <small>Fortune Hunter</small>
          <strong>選股雷達</strong>
        </div>
      </div>
      <div class="action-group">
        <button id="refresh" class="refresh" type="button">重新整理</button>
        <button id="live" class="live" type="button">即時連線</button>
      </div>
    </header>

    <section class="hero">
      <div class="hero-copy">
        <h1>中短線候選股</h1>
        <p class="lead">
          聚焦台股中短期機會，整合趨勢、型態、賣出警告與隔夜風險，
          自動產出 5、7、10 天節奏不同的交易建議。
        </p>
        <div class="hero-chip-row">
          <div class="hero-chip">型態選股</div>
          <div class="hero-chip">賣出警告</div>
          <div class="hero-chip">隔夜風險</div>
        </div>
      </div>
      <aside class="market-card">
        <span>本次清單</span>
        <b id="heroCount">-</b>
        <p id="heroCopy">等待載入最新候選股與掃描摘要。</p>
      </aside>
    </section>

    <section class="stats" aria-live="polite">
      <div class="stat"><strong id="asOf">等待更新</strong><span>資料時間</span></div>
      <div class="stat"><strong id="universe">-</strong><span>市場母池</span></div>
      <div class="stat"><strong id="scanned">-</strong><span>實際掃描檔數</span></div>
      <div class="stat"><strong id="count">-</strong><span>候選股票數</span></div>
    </section>
  </section>

  <section id="message" class="notice">正在準備最新資料。</section>
  <section id="cards" class="cards"></section>

  <footer>
    資料來源整合 TWSE OpenAPI、TPEX API、Yahoo Finance 與即時 SSE 報價。
    本頁提供中短線決策輔助，不是自動下單系統，仍需自行控管風險。
  </footer>
</main>

<script>
const els = {
  refresh: document.getElementById('refresh'),
  live: document.getElementById('live'),
  asOf: document.getElementById('asOf'),
  universe: document.getElementById('universe'),
  scanned: document.getElementById('scanned'),
  count: document.getElementById('count'),
  heroCount: document.getElementById('heroCount'),
  heroCopy: document.getElementById('heroCopy'),
  message: document.getElementById('message'),
  cards: document.getElementById('cards')
};

let currentData = null;
let liveSource = null;
let liveUrl = localStorage.getItem('fh_live_url') || '';

const escapeMap = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => escapeMap[char]);
}

function pctClass(value) {
  return Number(value) >= 0 ? 'positive' : 'negative';
}

function fmt(value, suffix = '') {
  return value === null || value === undefined ? '-' : `${esc(value)}${suffix}`;
}

function money(value) {
  return value === null || value === undefined ? '-' : `NT$ ${Number(value).toLocaleString('zh-TW')}`;
}

function localTime(iso) {
  if (!iso) return '尚未更新';
  return new Intl.DateTimeFormat('zh-TW', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(iso));
}

function renderBacktests(backtests) {
  if (!backtests?.length) return '<div class="backtest">目前沒有足夠的歷史回測事件可展示。</div>';
  return backtests.map(hit => `
    <div class="backtest">
      <b>${esc(hit.date)} 訊號分數 ${fmt(hit.signalScore)}</b>
      <div>進場價 ${money(hit.entryPrice)}</div>
      <div>3 日 <span class="${pctClass(hit.return3d)}">${fmt(hit.return3d, '%')}</span>，10 日 <span class="${pctClass(hit.return10d)}">${fmt(hit.return10d, '%')}</span></div>
      <div>10 日最大漲幅 <span class="${pctClass(hit.maxGain10d)}">${fmt(hit.maxGain10d, '%')}</span>，最大回撤 <span class="${pctClass(hit.maxDrawdown10d)}">${fmt(hit.maxDrawdown10d, '%')}</span></div>
    </div>`).join('');
}

function renderCard(item, index) {
  const score = Math.max(0, Math.min(100, Number(item.score || 0)));
  const patternBias = item.patterns?.bias || '-';
  const waitPatterns = item.patterns?.watch || [];
  const sellLevel = item.sellWarning?.level || '無';
  const sellReasons = item.sellWarning?.reasons || [];
  const cardId = `card-${esc(item.code)}-${index}`;
  const collapsed = index > 1;
  const buttonLabel = collapsed ? '展開詳情' : '收合詳情';

  return `
    <article class="card ${collapsed ? 'collapsed' : ''}" data-card>
      <div class="card-summary">
        <div class="card-summary-main">
          <span class="summary-name">${esc(item.name)}</span>
          <span class="summary-code">${esc(item.code)} ${esc(item.market)}</span>
          <span class="summary-score">分數 ${score}/100</span>
          <span class="signal">${esc(item.signal || '等待進場')}</span>
          <span class="sell-badge">賣出警告：${esc(sellLevel)}</span>
        </div>
        <button class="card-toggle" type="button" aria-expanded="${collapsed ? 'false' : 'true'}" aria-controls="${cardId}">
          ${buttonLabel}
        </button>
      </div>

      <div id="${cardId}" class="card-detail">
        <div>
          <div class="card-head">
            <div>
              <h2 class="stock-name">${esc(item.name)}<span class="stock-code">${esc(item.code)} ${esc(item.market)}</span></h2>
              <div class="signal-row">
                <span class="signal">${esc(item.signal || '等待進場')}</span>
                <span class="sell-badge">賣出警告：${esc(sellLevel)}</span>
              </div>
            </div>
            <div class="score">
              <strong>${score}</strong>
              <span>推薦分數 / 100</span>
              <div class="score-bar" style="--score:${score}%"><i></i></div>
            </div>
          </div>

          <div class="metrics">
            <div class="metric"><b>${money(item.latestPrice)}</b><span>最新收盤 ${esc(item.latestDate || '')}</span></div>
            <div class="metric"><b class="${pctClass(item.liveChangePercent)}">${fmt(item.liveChangePercent, '%')}</b><span>即時變動（若有）</span></div>
            <div class="metric"><b>${fmt(item.metrics?.rsi14)}</b><span>RSI(14)</span></div>
            <div class="metric"><b>${esc(patternBias)}</b><span>型態傾向</span></div>
            <div class="metric"><b class="${pctClass(item.change10d)}">${fmt(item.change10d, '%')}</b><span>近 10 日漲幅</span></div>
            <div class="metric"><b class="${pctClass(item.change20d)}">${fmt(item.change20d, '%')}</b><span>近 20 日漲幅</span></div>
            <div class="metric"><b>${fmt(item.metrics?.intentFactor60)}</b><span>價格意圖因子</span></div>
            <div class="metric"><b>${fmt(item.metrics?.rsv60)}</b><span>60 日相對位置</span></div>
            <div class="metric"><b>${money(item.metrics?.ma5)}</b><span>5 日線</span></div>
            <div class="metric"><b>${money(item.metrics?.ma20)}</b><span>20 日線</span></div>
            <div class="metric"><b>${fmt(item.metrics?.stopPct, '%')}</b><span>建議止損幅度</span></div>
            <div class="metric"><b>${fmt(item.metrics?.std20)}</b><span>20 日波動</span></div>
          </div>

          <div class="section-title">進場依據</div>
          <ul class="reason-list">${(item.reasons || []).map(reason => `<li>${esc(reason)}</li>`).join('')}</ul>
          ${waitPatterns.length ? `<div class="section-title">等待型態</div><ul class="reason-list">${waitPatterns.map(pattern => `<li>${esc(pattern)}</li>`).join('')}</ul>` : ''}
          ${(item.risks || []).length ? `<div class="section-title">風險提醒</div><ul class="reason-list">${item.risks.map(risk => `<li>${esc(risk)}</li>`).join('')}</ul>` : ''}

          <div class="section-title">操作手法</div>
          <div class="plan">
            <div class="plan-row"><b>持有週期：</b>${esc(item.plan?.horizon || '-')}</div>
            <div class="plan-row"><b>買進：</b>${esc(item.plan?.entry || '-')}</div>
            <div class="plan-row"><b>賣出：</b>${esc(item.plan?.takeProfit || '-')}</div>
            <div class="plan-row"><b>止損：</b>${esc(item.plan?.stopLoss || '-')}</div>
            <div class="plan-row"><b>賣出警告應對：</b>${esc(item.plan?.exitWarning || '-')}</div>
            <div class="plan-row"><b>部位：</b>${esc(item.plan?.positionSizing || '-')}</div>
          </div>
        </div>

        <aside class="side">
          <div class="side-panel">
            <div class="section-title">賣出警告</div>
            <div class="warning-box">
              <strong>${esc(sellLevel)} 等級</strong>
              <div>${esc(item.sellWarning?.action || '目前無明確賣出警告，仍需紀律控管。')}</div>
            </div>
            ${sellReasons.length ? `<ul class="reason-list">${sellReasons.map(reason => `<li>${esc(reason)}</li>`).join('')}</ul>` : '<div class="notice" style="margin:12px 0 0;">目前沒有額外賣出警示，請依停損與持有週期管理。</div>'}

            <div class="section-title">回測參考</div>
            <div class="backtests">${renderBacktests(item.backtest)}</div>
          </div>
        </aside>
      </div>
    </article>`;
}

function bindCardToggles() {
  document.querySelectorAll('.card-toggle').forEach(button => {
    button.addEventListener('click', () => {
      const card = button.closest('[data-card]');
      if (!card) return;
      card.classList.toggle('collapsed');
      const expanded = !card.classList.contains('collapsed');
      button.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      button.textContent = expanded ? '收合詳情' : '展開詳情';
    });
  });
}

async function loadData() {
  els.refresh.disabled = true;
  els.message.textContent = '正在讀取最新推薦資料...';
  try {
    const response = await fetch(`data/recommendations.json?ts=${Date.now()}`, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    currentData = data;
    const count = data.recommendations?.length || 0;

    els.asOf.textContent = data.generatedAtTaipei || localTime(data.asOf);
    els.universe.textContent = Number(data.universeSize || 0).toLocaleString('zh-TW');
    els.scanned.textContent = Number(data.scanned || 0).toLocaleString('zh-TW');
    els.count.textContent = count;
    els.heroCount.textContent = count;
    els.heroCopy.textContent = data.scanStrategy || '等待最新掃描摘要。';
    els.message.textContent = data.source || '資料已更新。';

    if (!count) {
      els.cards.innerHTML = '<div class="empty">目前沒有符合條件的候選股，請稍後重整或等待下一次資料更新。</div>';
      return;
    }

    els.cards.innerHTML = data.recommendations.map(renderCard).join('');
    bindCardToggles();
    if (liveUrl) connectLive(liveUrl);
  } catch (error) {
    els.message.textContent = `讀取資料失敗：${error.message}`;
    els.heroCopy.textContent = '目前無法載入掃描摘要。';
    els.cards.innerHTML = '<div class="empty">無法載入 data/recommendations.json，請確認資料檔是否存在且格式正確。</div>';
  } finally {
    els.refresh.disabled = false;
  }
}

function applyLiveQuotes(payload) {
  if (!currentData?.recommendations?.length || !payload?.quotes?.length) return;
  const quoteMap = new Map(payload.quotes.map(quote => [quote.symbol, quote]));
  for (const row of currentData.recommendations) {
    const symbol = `${row.code}.${row.market === '上市' ? 'TW' : 'TWO'}`;
    const live = quoteMap.get(symbol);
    if (!live) continue;
    row.latestPrice = live.price;
    row.latestDate = new Date(live.ts).toISOString().slice(0, 10);
    row.liveChangePercent = live.changePercent;
  }
  els.asOf.textContent = `即時更新 ${new Intl.DateTimeFormat('zh-TW', { timeStyle: 'medium' }).format(new Date())}`;
  els.cards.innerHTML = currentData.recommendations.map(renderCard).join('');
  bindCardToggles();
}

function connectLive(url) {
  if (liveSource) {
    liveSource.close();
    liveSource = null;
  }
  try {
    const streamUrl = url.endsWith('/stream') ? url : `${url.replace(/\/$/, '')}/stream`;
    liveSource = new EventSource(streamUrl);
    liveSource.addEventListener('quotes', event => {
      const payload = JSON.parse(event.data);
      applyLiveQuotes(payload);
      els.message.textContent = `已連到即時來源：${url}`;
    });
    liveSource.addEventListener('error', () => {
      els.message.textContent = `即時來源連線異常，請確認服務是否可用：${url}`;
    });
  } catch (error) {
    els.message.textContent = `即時連線失敗：${error.message}`;
  }
}

function setupLiveButton() {
  els.live.textContent = liveUrl ? '即時連線中' : '即時連線';
  els.live.addEventListener('click', () => {
    const input = prompt('請輸入 live server 網址，例如 https://your-live.onrender.com', liveUrl || '');
    if (input === null) return;
    liveUrl = input.trim();
    if (!liveUrl) {
      localStorage.removeItem('fh_live_url');
      if (liveSource) liveSource.close();
      liveSource = null;
      els.live.textContent = '即時連線';
      els.message.textContent = '已清除即時來源設定，畫面將只顯示批次資料。';
      return;
    }
    localStorage.setItem('fh_live_url', liveUrl);
    els.live.textContent = '即時連線中';
    connectLive(liveUrl);
  });
}

els.refresh.addEventListener('click', loadData);
setupLiveButton();
loadData();
</script>
</body>
</html>
